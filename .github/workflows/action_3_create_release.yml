name: "Action 3 - Create a Release"

on:
  pull_request:
    types:
      - closed
      
permissions:
  contents: write 

jobs:
  release-if-merged:
    if: |
      github.event.pull_request.merged == true && 
      startsWith(github.head_ref, 'release/20') &&
      github.repository == 'davidhardy5-nhs/test-public'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Get Release Name from PR Branch Name and create a release
        run: |
          RELEASE_NAME=${HEAD_REF//release\//}
          gh release create $RELEASE_NAME -t $RELEASE_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
